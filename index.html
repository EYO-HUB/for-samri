<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samri's Universe 🎂</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #050505;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            transition: background 2s ease;
        }

        /* Holiday Mode Flash */
        body.holiday-active {
            background: linear-gradient(135deg, #fff7a8 0%, #ffb347 40%, #ff6b81 70%, #c67cff 100%);
            background-size: 200% 200%;
        }

        /* --- STAGE 1: THE GIFT BOX --- */
        #gift-screen {
            position: fixed; inset: 0;
            background: #111;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 2000;
            transition: all 1s ease-out;
            cursor: pointer;
        }

        .box-icon {
            font-size: 120px;
            filter: drop-shadow(0 0 20px #e91e63);
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        /* --- STAGE 2: THE UNIVERSE --- */
        #universe {
            position: relative; width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transform: scale(0.5);
            transition: all 2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .sun {
            width: 140px; height: 140px;
            background: radial-gradient(circle, #fff700, #ff8c00);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 204, 0, 0.7);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 100;
            color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            transition: all 0.5s ease;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }
        .sun:hover { transform: scale(1.1); box-shadow: 0 0 100px #ffcc00; }

        /* ORBIT LOGIC */
        .orbit {
            position: absolute;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: orbitRotate linear infinite;
            /* CRITICAL: Allows interaction with photos underneath larger orbits */
            pointer-events: none; 
        }

        .planet {
            position: absolute;
            top: 0; left: 50%;
            transform: translate(-50%, -50%); 
            border-radius: 50%;
            border: 3px solid #fff;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            pointer-events: auto; /* Enables clicking on the photo itself */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ZOOMING EFFECT */
        .planet:hover {
            transform: translate(-50%, -50%) scale(4);
            z-index: 9999 !important;
            border-color: #e91e63;
            box-shadow: 0 0 30px rgba(233, 30, 99, 0.8);
        }

        /* 7 Paths - Ordered Z-index so inner orbits aren't "buried" */
        .o1 { width: 220px; height: 220px; animation-duration: 10s; z-index: 70; }
        .o2 { width: 340px; height: 340px; animation-duration: 15s; animation-direction: reverse; z-index: 60; }
        .o3 { width: 460px; height: 460px; animation-duration: 22s; z-index: 50; }
        .o4 { width: 580px; height: 580px; animation-duration: 30s; animation-direction: reverse; z-index: 40; }
        .o5 { width: 700px; height: 700px; animation-duration: 40s; z-index: 30; }
        .o6 { width: 820px; height: 820px; animation-duration: 55s; animation-direction: reverse; z-index: 20; }
        .o7 { width: 940px; height: 940px; animation-duration: 70s; z-index: 10; }

        /* Planet Sizes */
        .p1 { width: 50px; height: 50px; }
        .p2 { width: 55px; height: 55px; }
        .p3 { width: 60px; height: 60px; }
        .p4 { width: 65px; height: 65px; }
        .p5 { width: 70px; height: 70px; }
        .p6 { width: 75px; height: 75px; }
        .p7 { width: 80px; height: 80px; }

        @keyframes orbitRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* HOLIDAY OVERLAYS */
        #overlay-ui { position: fixed; inset: 0; pointer-events: none; z-index: 150; display: none; }
        .float-item { position: absolute; animation: riseUp 8s linear infinite; font-size: 40px; }
        @keyframes riseUp { 0% { bottom: -100px; opacity: 1; } 100% { bottom: 110%; opacity: 0; } }
    </style>
</head>
<body id="body">

    <audio id="bgMusic" loop>
        <source src="samri (1).mp3" type="audio/mpeg">
    </audio>

    <div id="gift-screen" onclick="revealUniverse()">
        <div class="box-icon">🎁</div>
        <p style="color: #ffcc00; letter-spacing: 4px; font-weight: bold; margin-top: 20px;">FOR MY SISTER SAMRI</p>
    </div>

    <div id="universe">
        <div class="sun" id="mainSun" onclick="activateHoliday()">
            <span id="sunText">BLOW<br>ME</span>
        </div>

        <div class="orbit o1"><img src="photo 1.jpg" class="planet p1" alt="Samri 1"></div>
        <div class="orbit o2"><img src="photo 2.jpg" class="planet p2" alt="Samri 2"></div>
        <div class="orbit o3"><img src="photo 3.jpg" class="planet p3" alt="Samri 3"></div>
        <div class="orbit o4"><img src="photo 4.jpg" class="planet p4" alt="Samri 4"></div>
        <div class="orbit o5"><img src="photo 5.jpg" class="planet p5" alt="Samri 5"></div>
        <div class="orbit o6"><img src="photo 6.jpg" class="planet p6" alt="Samri 6"></div>
        <div class="orbit o7"><img src="photo 7.jpg" class="planet p7" alt="Samri 7"></div>
    </div>

    <div id="overlay-ui"></div>

    <script>
        function revealUniverse() {
            const gift = document.getElementById('gift-screen');
            gift.style.opacity = '0';
            setTimeout(() => {
                gift.style.display = 'none';
                const uni = document.getElementById('universe');
                uni.style.opacity = '1';
                uni.style.transform = 'scale(1)';
            }, 800);
        }

        function activateHoliday() {
            const body = document.getElementById('body');
            if (body.classList.contains('holiday-active')) return;

            body.classList.add('holiday-active');
            document.getElementById('overlay-ui').style.display = 'block';
            
            const sunText = document.getElementById('sunText');
            sunText.innerHTML = "HAPPY BIRTHDAY<br>SAMRI ❤️";
            
            const sun = document.getElementById('mainSun');
            sun.style.background = "#e91e63";
            sun.style.boxShadow = "0 0 80px #e91e63";

            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("Audio play blocked by browser"));

            const items = ['🎈', '🎂', '🎉', '💖', '✨', 'መልካም ልደት'];
            setInterval(() => {
                const el = document.createElement('div');
                el.className = 'float-item';
                el.innerHTML = items[Math.floor(Math.random() * items.length)];
                el.style.left = Math.random() * 100 + 'vw';
                document.getElementById('overlay-ui').appendChild(el);
                setTimeout(() => el.remove(), 8000);
            }, 500);
        }
    </script>
</body>
</html>
